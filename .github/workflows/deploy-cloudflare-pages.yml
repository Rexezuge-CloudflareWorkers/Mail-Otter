name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]

jobs:
  deploy:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm --filter @mail-otter/web build

      - name: Configure Pages Service Bindings
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          if [ -z "${CLOUDFLARE_PAGES_PROJECT_NAME}" ]; then
            echo "CLOUDFLARE_PAGES_PROJECT_NAME repository variable is required"
            exit 1
          fi
          cp apps/web/wrangler.template.jsonc wrangler.jsonc
        env:
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}

      - name: Deploy with Wrangler Pages
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          pnpm exec wrangler pages deploy \
            --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "$(git log -1 --pretty=%s)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
